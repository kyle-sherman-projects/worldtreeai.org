<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} | WorldTree{% else %}WorldTree | Safe AI Integration for School Success{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_newlines | truncate: 200 }}" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />

  <!-- Open Graph — controls how links look when shared to LinkedIn, where the content strategy lives -->
  <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}" />
  <meta property="og:title" content="{{ page.title | default: 'WorldTree — Safe AI Integration for School Success' }}" />
  <meta property="og:description" content="{{ page.description | default: site.description | strip_newlines | truncate: 200 }}" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <meta property="og:image" content="{{ '/assets/logo.png' | absolute_url }}" />
  <meta name="twitter:card" content="summary" />

  <link rel="icon" href="/assets/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/site.css" />
  {% feed_meta %}
</head>
<body>

{% include nav.html %}

{{ content }}

{% include footer.html %}

</body>
</html>
